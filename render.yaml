# Render Blueprint — MoneyPrinterTurbo render worker (headless FastAPI).
#
# Monorepo deploy: the worker source lives in services/mpt-worker/ and is deployed
# from there via `rootDir`. Vercel builds the Next.js app at the repo root and
# ignores services/mpt-worker (see .vercelignore). These are two independent
# deploys of one repo — the worker's Docker build does NOT depend on the Next build.
#
# Deploy: in Render → New → Blueprint, point at this repo. Set MPT_API_KEY
# (= MM's MPT_API_TOKEN) and CORS_ALLOWED_ORIGINS as secrets in the dashboard.
# BYO model/stock keys travel per-request, so NO global LLM/Pexels keys here.
services:
  - type: web
    name: mpt-render-worker
    runtime: docker
    rootDir: services/mpt-worker      # monorepo subdir; build context + Dockerfile path are relative to this
    dockerfilePath: ./Dockerfile.api
    plan: standard                    # ~2 GB RAM. Bump to `pro` if larger/longer videos OOM (MoviePy is RAM-heavy).
    region: oregon
    healthCheckPath: /docs            # FastAPI Swagger UI; 200 once the app is up.
    autoDeploy: false
    disk:
      name: mpt-scratch
      mountPath: /MoneyPrinterTurbo/storage   # in-flight render scratch; MM pulls finished mp4s out then deletes the task
      sizeGB: 10
    envVars:
      - key: MPT_API_KEY              # shared bearer token; MUST equal MM's MPT_API_TOKEN
        sync: false                   # set in the Render dashboard (secret); do not commit
      - key: PORT
        value: 8080
      - key: CORS_ALLOWED_ORIGINS     # set to the MM origin(s); avoid "*" in production
        sync: false
