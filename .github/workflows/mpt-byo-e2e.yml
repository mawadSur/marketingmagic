name: MPT worker — BYO + render E2E

# Verifies the vendored MoneyPrinterTurbo worker (services/mpt-worker): the
# bring-your-own-key multi-tenant patch (test/test_byo.py) AND a real end-to-end
# render (test/test_render_smoke.py). The render test is skipped on ffmpeg >= 8
# (MoviePy 2.1.2 reads 0 frames there); ubuntu-latest ships apt ffmpeg 5.x/6.x so
# it actually runs. Edge-TTS needs outbound network, which GitHub runners have.
# Path-filtered so it only runs when the worker changes.

on:
  push:
    paths:
      - "services/mpt-worker/**"
      - ".github/workflows/mpt-byo-e2e.yml"
  pull_request:
    paths:
      - "services/mpt-worker/**"
      - ".github/workflows/mpt-byo-e2e.yml"
  workflow_dispatch:

jobs:
  byo-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # MoviePy/imageio-ffmpeg otherwise downloads its own bundled ffmpeg (7.0.2)
    # and reads with THAT, not the apt ffmpeg we install. The render material is
    # encoded by the apt ffmpeg (6.1), so 7.0.2 reads it as 0 frames ("failed to
    # read the first frame"). Pin MoviePy to the same apt binary so encode +
    # decode match. (Diagnosed via the [FFDIAG] startup log.)
    env:
      IMAGEIO_FFMPEG_EXE: /usr/bin/ffmpeg
    defaults:
      run:
        working-directory: services/mpt-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install render dependencies (ffmpeg + imagemagick + DejaVu font)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick fonts-dejavu-core

      - name: Bundle the default subtitle font (mirrors Dockerfile.api)
        run: cp /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf resource/fonts/DejaVuSans.ttf

      - name: Show ffmpeg version (must be < 8 for the render smoke to run)
        run: ffmpeg -version | head -1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Sync dependencies (uv)
        run: uv sync

      - name: Run BYO + render E2E tests
        run: uv run pytest test/test_byo.py test/test_render_smoke.py -v
