name: cron / learning-digest

# "What we learned & changed" — weekly learning digest. Vercel Hobby only allows
# daily crons, so (like the other cron jobs) we run it from GitHub Actions and
# hit the public route, which is auth-gated by Bearer CRON_SECRET. Sends one
# learning-loop summary email per workspace that has confident theme winners
# and/or an AI review (cold-start workspaces are skipped by the route).

on:
  schedule:
    - cron: "0 14 * * 1" # 14:00 UTC every Monday — start-of-week recap
  workflow_dispatch: {}

concurrency:
  group: cron-learning-digest
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send weekly learning digests
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::Missing SITE_URL or CRON_SECRET repo secret."
            exit 1
          fi
          RESPONSE_FILE="$(mktemp)"
          HTTP_CODE="$(curl --silent --show-error \
               --max-time 120 \
               -o "$RESPONSE_FILE" \
               -w '%{http_code}' \
               -H "Authorization: Bearer $CRON_SECRET" \
               -X POST \
               "$SITE_URL/api/cron/learning-digest")"
          echo "HTTP status: $HTTP_CODE"
          echo "::group::Response body"
          jq . "$RESPONSE_FILE" 2>/dev/null || cat "$RESPONSE_FILE"
          echo
          echo "::endgroup::"
          SUMMARY="$(jq -c 'to_entries | map(select(.value | type == "number")) | from_entries' "$RESPONSE_FILE" 2>/dev/null)"
          if [ -n "$SUMMARY" ] && [ "$SUMMARY" != "{}" ]; then
            echo "::notice title=learning digest::$SUMMARY"
          fi
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::cron route returned HTTP $HTTP_CODE"
            exit 1
          fi
