name: cron / pull-metrics

# Hourly metrics pull. 13 past the hour to keep us off the top-of-hour
# stampede that hits every API. Route is auth-gated by Bearer CRON_SECRET.

on:
  schedule:
    - cron: "13 * * * *"
  workflow_dispatch: {}

concurrency:
  group: cron-pull-metrics
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Refresh engagement metrics for posts shipped in the last 7 days (all channels)
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::Missing SITE_URL or CRON_SECRET repo secret."
            exit 1
          fi
          RESPONSE_FILE="$(mktemp)"
          HTTP_CODE="$(curl --silent --show-error \
               --max-time 120 \
               -o "$RESPONSE_FILE" \
               -w '%{http_code}' \
               -H "Authorization: Bearer $CRON_SECRET" \
               -X POST \
               "$SITE_URL/api/cron/pull-metrics")"
          echo "HTTP status: $HTTP_CODE"
          echo "::group::Response body"
          jq . "$RESPONSE_FILE" 2>/dev/null || cat "$RESPONSE_FILE"
          echo
          echo "::endgroup::"
          SUMMARY="$(jq -c 'to_entries | map(select(.value | type == "number")) | from_entries' "$RESPONSE_FILE" 2>/dev/null)"
          if [ -n "$SUMMARY" ] && [ "$SUMMARY" != "{}" ]; then
            echo "::notice title=cron summary::$SUMMARY"
          fi
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::cron route returned HTTP $HTTP_CODE"
            exit 1
          fi
