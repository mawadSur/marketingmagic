name: cron / pull-metrics

# Hourly metrics pull. 13 past the hour to keep us off the top-of-hour
# stampede that hits every API. Route is auth-gated by Bearer CRON_SECRET.

on:
  schedule:
    - cron: "13 * * * *"
  workflow_dispatch: {}

concurrency:
  group: cron-pull-metrics
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger pull-metrics
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing SITE_URL or CRON_SECRET repo secret." >&2
            exit 1
          fi
          curl --fail-with-body \
               --silent --show-error \
               --max-time 120 \
               -H "Authorization: Bearer $CRON_SECRET" \
               -X POST \
               "$SITE_URL/api/cron/pull-metrics"
