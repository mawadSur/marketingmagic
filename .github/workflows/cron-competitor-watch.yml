name: cron / competitor-watch

# Phase 6.6 — daily competitor-watch pull. 12:00 UTC so it lands before
# the email-digest cron (14:00 UTC) and the theme-gaps cron (13:30 UTC).
# Same Bearer CRON_SECRET shape as the other cron pings.

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch: {}

concurrency:
  group: cron-competitor-watch
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger competitor-watch
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing SITE_URL or CRON_SECRET repo secret." >&2
            exit 1
          fi
          curl --fail-with-body \
               --silent --show-error \
               --max-time 600 \
               -H "Authorization: Bearer $CRON_SECRET" \
               -X POST \
               "$SITE_URL/api/cron/competitor-watch"
