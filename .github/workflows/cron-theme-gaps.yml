name: cron / theme-gaps

# Phase 6.9 — daily theme-gap detection. 13:30 UTC so it observes 30 min
# before the email-digest cron (14:00 UTC) without coupling — the digest
# re-runs detection at read time. Same Bearer CRON_SECRET shape as the
# other cron pings.

on:
  schedule:
    - cron: "30 13 * * *"
  workflow_dispatch: {}

concurrency:
  group: cron-theme-gaps
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger theme-gaps
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing SITE_URL or CRON_SECRET repo secret." >&2
            exit 1
          fi
          curl --fail-with-body \
               --silent --show-error \
               --max-time 300 \
               -H "Authorization: Bearer $CRON_SECRET" \
               -X POST \
               "$SITE_URL/api/cron/theme-gaps"
