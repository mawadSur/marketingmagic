name: Lighthouse CI

# Non-blocking Lighthouse audit on main branch and PRs.
# Reports performance/a11y/best-practices scores as advisory — no build failure.
# Targets the live production pages (landing + pricing) to avoid spinning up
# a full build in CI (saves time + resources; landing pages are public anyway).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://marketingmagic.vercel.app/
            https://marketingmagic.vercel.app/pricing
          configPath: ./lighthouserc.json
          # Non-blocking: always succeeds, only reports scores
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            // Lighthouse results are uploaded to temporary storage by the action
            // and a link is printed in the logs. This step just adds a note to
            // the PR so reviewers know where to find the report.
            const fs = require('fs');
            const manifestPath = './.lighthouseci/manifest.json';
            if (fs.existsSync(manifestPath)) {
              const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
              const links = manifest.map(m => `- [${m.url}](${m.htmlPath})`).join('\n');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## ⚡ Lighthouse CI Results\n\nAudited pages:\n${links}\n\n_Note: These scores are advisory (non-blocking). Review for regressions._`
              });
            }
