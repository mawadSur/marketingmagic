name: cron / goal-replan-check

# Phase 2.1 follow-up — daily mid-course replan check. 12:00 UTC, before
# the theme-gaps cron (13:30) and the email-digest (14:00), so any
# proposals raised today are visible on the dashboard widget by the time
# the operator opens their morning digest. Same Bearer CRON_SECRET shape
# as the other cron pings.

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch: {}

concurrency:
  group: cron-goal-replan-check
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Detect behind-pace goals past week-2 and stage replan_proposals rows
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::Missing SITE_URL or CRON_SECRET repo secret."
            exit 1
          fi
          RESPONSE_FILE="$(mktemp)"
          HTTP_CODE="$(curl --silent --show-error \
               --max-time 300 \
               -o "$RESPONSE_FILE" \
               -w '%{http_code}' \
               -H "Authorization: Bearer $CRON_SECRET" \
               -X POST \
               "$SITE_URL/api/cron/goal-replan-check")"
          echo "HTTP status: $HTTP_CODE"
          echo "::group::Response body"
          jq . "$RESPONSE_FILE" 2>/dev/null || cat "$RESPONSE_FILE"
          echo
          echo "::endgroup::"
          SUMMARY="$(jq -c 'to_entries | map(select(.value | type == "number")) | from_entries' "$RESPONSE_FILE" 2>/dev/null)"
          if [ -n "$SUMMARY" ] && [ "$SUMMARY" != "{}" ]; then
            echo "::notice title=cron summary::$SUMMARY"
          fi
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::cron route returned HTTP $HTTP_CODE"
            exit 1
          fi
