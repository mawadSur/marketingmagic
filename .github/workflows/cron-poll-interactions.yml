name: cron / poll-interactions

# Phase 4.5 — unified inbox poller. Runs every 15 minutes. The route
# does per-channel throttling internally: X + Bluesky poll on every
# invocation, LinkedIn / IG / Threads only when the UTC minute falls
# in the first quarter of the hour (effectively hourly).
#
# IG + Threads are stubbed behind MetaAppReviewPendingError today —
# accounts on those channels surface as `tier_pending` in the response,
# not failed. Schema + cron wiring are ready for the day Meta approves
# `instagram_manage_comments` / `threads_manage_replies`.
#
# Auth: same Bearer CRON_SECRET pattern as the other cron pings.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: cron-poll-interactions
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Poll X/Bluesky every 15m + LinkedIn/IG/Threads hourly into unified inbox
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::Missing SITE_URL or CRON_SECRET repo secret."
            exit 1
          fi
          RESPONSE_FILE="$(mktemp)"
          HTTP_CODE="$(curl --silent --show-error \
               --max-time 540 \
               -o "$RESPONSE_FILE" \
               -w '%{http_code}' \
               -H "Authorization: Bearer $CRON_SECRET" \
               -X POST \
               "$SITE_URL/api/cron/poll-interactions")"
          echo "HTTP status: $HTTP_CODE"
          echo "::group::Response body"
          jq . "$RESPONSE_FILE" 2>/dev/null || cat "$RESPONSE_FILE"
          echo
          echo "::endgroup::"
          SUMMARY="$(jq -c 'to_entries | map(select(.value | type == "number")) | from_entries' "$RESPONSE_FILE" 2>/dev/null)"
          if [ -n "$SUMMARY" ] && [ "$SUMMARY" != "{}" ]; then
            echo "::notice title=cron summary::$SUMMARY"
          fi
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::cron route returned HTTP $HTTP_CODE"
            exit 1
          fi
