name: cron / email-digest

# Daily approval digest. 14:00 UTC = 09:00 America/New_York during EST and
# 10:00 during EDT — close enough to "morning Eastern" without dealing with
# DST in cron (which doesn't support timezones). Route auth-gated by
# Bearer CRON_SECRET, same as the other cron pings.

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch: {}

concurrency:
  group: cron-email-digest
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger email-digest
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing SITE_URL or CRON_SECRET repo secret." >&2
            exit 1
          fi
          curl --fail-with-body \
               --silent --show-error \
               --max-time 120 \
               -H "Authorization: Bearer $CRON_SECRET" \
               -X POST \
               "$SITE_URL/api/cron/email-digest"
